name: Playwright + BDD + Allure CI

on:
  push:
    branches: [main, firstcomment]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit] # multi-browser matrix

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install allure-pytest pytest-xdist pytest-rerunfailures

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests (parallel + retries + attachments)
        run: |
          pytest \
            -n auto \
            --reruns 2 \
            --alluredir=allure-results \
            --capture=tee-sys

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre unzip wget
          wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.42.0/allure-commandline-2.42.0.zip
          unzip allure-commandline-2.42.0.zip -d allure-cli
          sudo ln -s $PWD/allure-cli/allure-2.42.0/bin/allure /usr/local/bin/allure
          allure --version

      - name: Download previous Allure history
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy history into new results
        run: |
          if [ -d gh-pages/history ]; then
            cp -R gh-pages/history allure-results/history
          fi

      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Copy new history for publishing
        run: |
          mkdir -p gh-pages
          cp -R allure-report/history gh-pages/history

      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

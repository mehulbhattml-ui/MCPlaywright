name: Tests with Allure

on:
  push:
    branches: [main, firstcomment]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install allure-pytest

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      #     - name: Run tests with Allure
      #       run: |
      #        pytest --alluredir=allure-results

      - name: Run BDD tests with Allure
        run: |
          pytest --alluredir=allure-results

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre unzip wget
          wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.42.0/allure-commandline-2.42.0.zip
          unzip allure-commandline-2.42.0.zip -d allure-cli
          sudo ln -s $PWD/allure-cli/allure-2.42.0/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
